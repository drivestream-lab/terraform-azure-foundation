{% raw %}name: plan

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write   # OIDC federation — no stored cloud secrets
  contents: read
  pull-requests: write

jobs:
  offline-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.9.8" }
      - uses: terraform-linters/setup-tflint@v4
      - run: tflint --init
      - run: make check
      - run: make test

  plan:
    needs: offline-gates
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [{% endraw %}__ENV_LIST_YAML__{% raw %}]
    environment: ${{ matrix.env }}   # pulls per-env vars; NO approval gate on plan
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.9.8", terraform_wrapper: false }
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_PLAN_CLIENT_ID }}   # read-only identity
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: plan + policy gate
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.AZURE_PLAN_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: make plan ENV=${{ matrix.env }}
      - name: upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan-${{ matrix.env }}-${{ github.sha }}
          path: envs/${{ matrix.env }}/plan.tfplan
      - name: plan summary on PR
        run: |
          echo "## plan — ${{ matrix.env }}" >> "$GITHUB_STEP_SUMMARY"
          cd envs/${{ matrix.env }} && terraform show -no-color plan.tfplan | tail -30 >> "$GITHUB_STEP_SUMMARY"
{% endraw %}